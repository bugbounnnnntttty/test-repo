name: Check Docker Config
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker daemon config
        run: |
          echo "=== Current daemon.json ==="
          cat /etc/docker/daemon.json 2>&1 || echo "NO daemon.json"
          echo "=== Docker info ==="
          docker info 2>&1 | grep -i "insecure\|registry\|server"
          echo "=== Can we modify daemon.json before services start? ==="
          echo "Services and container pulls happen BEFORE steps"
          echo "So we cannot modify daemon.json in time"
          echo ""
          echo "=== BUT: what about DOCKER_HOST and DOCKER_TLS_VERIFY? ==="
          echo "If we set DOCKER_TLS_VERIFY=0 in env, does it affect the pull?"
